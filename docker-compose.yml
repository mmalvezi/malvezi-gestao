name: malvezi-gestao

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: malvezi
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: malvezi
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U malvezi"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://malvezi:${DB_PASSWORD}@db:5432/malvezi
      SECRET_KEY: ${SECRET_KEY}
      APP_PASSWORD: ${APP_PASSWORD}
      API_KEY: ${API_KEY}
      UPLOADS_DIR: /app/uploads
    volumes:
      # Propostas em PDF anexadas aos orcamentos: precisam sobreviver ao rebuild
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:${HOST_PORT}:80"

volumes:
  pgdata:
  uploads:
