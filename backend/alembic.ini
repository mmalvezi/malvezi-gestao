# Configuracao do Alembic. A URL do banco NAO fica aqui: o env.py le a
# DATABASE_URL do ambiente (mesma usada pelo app), entao um unico deploy
# funciona no SQLite local e no Postgres do VPS.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = %(here)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
